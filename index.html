<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earlinki — P2P</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222f;
  --border: #2a2a3a;
  --accent: #00e5a0;
  --accent2: #7c6bff;
  --accent3: #ff6b6b;
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #44445a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --sidebar: 220px;
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text)}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}

/* ── Layout ──────────────────────────────────────────── */
#layout{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:var(--sidebar) 1fr;
  grid-template-rows:auto 1fr;
  height:100vh;
  max-width:1000px;
  margin:0 auto;
}

/* ── Header ──────────────────────────────────────────── */
#topbar{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.logo{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.my-code-badge{
  font-family:var(--mono);font-size:0.72rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:100px;padding:4px 12px;
  color:var(--text2);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.my-code-badge:hover{border-color:var(--accent);color:var(--accent)}
.my-code-badge .code-val{color:var(--accent);font-weight:700;letter-spacing:3px}
.status-pill{
  font-family:var(--mono);font-size:0.68rem;
  padding:4px 10px;border-radius:100px;border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;gap:5px;margin-left:auto;
  transition:all .3s;
}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:all .3s}
.status-pill.online{border-color:var(--accent);color:var(--accent)}
.status-pill.online .dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.status-pill.connecting{border-color:var(--accent2);color:var(--accent2)}
.status-pill.connecting .dot{background:var(--accent2);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Sidebar ──────────────────────────────────────────── */
#sidebar{
  border-right:1px solid var(--border);
  background:var(--surface);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#sidebar-inner{
  flex:1;overflow-y:auto;padding:12px 8px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#sidebar-inner::-webkit-scrollbar{width:3px}
#sidebar-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sidebar-section-title{
  font-family:var(--mono);font-size:0.6rem;color:var(--text3);
  letter-spacing:2px;text-transform:uppercase;
  padding:4px 8px 8px;
}

/* Tab item */
.tab-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;margin-bottom:2px;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.tab-item:hover{background:var(--surface2)}
.tab-item.active{background:var(--surface3);border:1px solid var(--border)}
.tab-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.tab-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--surface3);display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;border:1px solid var(--border);flex-shrink:0;
  position:relative;
}
.tab-online-dot{
  position:absolute;bottom:0;right:0;
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);border:2px solid var(--surface);
}
.tab-info{flex:1;min-width:0}
.tab-name{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-code{font-family:var(--mono);font-size:0.62rem;color:var(--text3);letter-spacing:1px}
.tab-unread{
  background:var(--accent2);color:#fff;
  font-size:0.6rem;font-weight:700;font-family:var(--mono);
  min-width:16px;height:16px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;flex-shrink:0;
}
.tab-close{
  background:none;border:none;color:var(--text3);
  cursor:pointer;padding:2px 4px;border-radius:4px;
  font-size:0.7rem;transition:color .15s;flex-shrink:0;
  display:none;
}
.tab-item:hover .tab-close{display:block}
.tab-close:hover{color:var(--accent3)}

/* Connect panel in sidebar */
#connect-panel{padding:8px}
.connect-panel-inner{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;
}
.connect-row{display:flex;gap:6px}
.code-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:9px 10px;
  font-family:var(--mono);font-size:1rem;font-weight:700;
  color:var(--text);letter-spacing:4px;text-align:center;
  outline:none;transition:border-color .2s;width:100%;
  -webkit-appearance:none;
}
.code-input:focus{border-color:var(--accent)}
.code-input::placeholder{color:var(--text3);letter-spacing:1px;font-size:0.75rem;font-weight:400}
.btn-go{
  background:var(--accent);color:#000;border:none;
  border-radius:6px;padding:9px 12px;font-size:1rem;
  cursor:pointer;transition:all .15s;font-weight:700;
  -webkit-tap-highlight-color:transparent;
}
.btn-go:hover{background:#00ffb3}
.btn-go:active{transform:scale(.95)}

/* Saved devices */
.saved-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.saved-item:hover{background:var(--surface2)}
.saved-item:active{transform:scale(.98)}
.saved-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--surface3);display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;border:1px solid var(--border);flex-shrink:0;
}
.saved-info{flex:1;min-width:0}
.saved-name{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-code{font-family:var(--mono);font-size:0.6rem;color:var(--text3)}
.saved-del{
  background:none;border:none;color:var(--text3);
  cursor:pointer;font-size:0.7rem;padding:3px;border-radius:3px;
  transition:color .15s;display:none;
}
.saved-item:hover .saved-del{display:block}
.saved-del:hover{color:var(--accent3)}
.sidebar-empty{
  font-family:var(--mono);font-size:0.68rem;
  color:var(--text3);text-align:center;padding:16px 8px;
}

/* ── Main area ──────────────────────────────────────────── */
#main{
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* Welcome */
#welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:var(--text3);
  font-family:var(--mono);font-size:0.8rem;
  text-align:center;padding:32px;
}
#welcome .big{font-size:2.5rem;margin-bottom:8px}
#welcome .hint{font-size:0.72rem;max-width:280px;line-height:1.7}

/* Chat panel */
.chat-panel{
  flex:1;display:none;flex-direction:column;
  overflow:hidden;animation:fadeIn .25s ease;
}
.chat-panel.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Messages */
.messages-area{
  flex:1;overflow-y:auto;
  padding:16px;display:flex;flex-direction:column;gap:8px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{
  max-width:82%;padding:10px 14px;border-radius:14px;
  font-size:0.85rem;line-height:1.5;word-break:break-word;
  animation:msgIn .2s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-sent{background:var(--accent);color:#000;align-self:flex-end;border-bottom-right-radius:4px}
.msg-received{background:var(--surface2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-meta{font-size:0.62rem;opacity:.55;margin-top:4px;font-family:var(--mono)}
.msg-sent .msg-meta{text-align:right}
.msg-link-actions{display:flex;gap:6px;margin-top:8px}
.btn-link-action{
  font-family:var(--sans);font-size:0.7rem;font-weight:600;
  padding:4px 10px;border-radius:6px;cursor:pointer;border:none;transition:all .15s;
}
.btn-open{background:rgba(0,0,0,0.25);color:#000}
.btn-copy-link{background:rgba(0,0,0,0.15);color:#000}

/* File messages */
.msg-file{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;border-bottom-left-radius:4px;
  align-self:flex-start;max-width:82%;
  animation:msgIn .2s ease;
}
.msg-file.sent{align-self:flex-end;border-bottom-left-radius:14px;border-bottom-right-radius:4px}
.file-icon{font-size:1.5rem;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-weight:600;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-family:var(--mono);font-size:0.65rem;color:var(--text2);margin-top:2px}
.btn-dl{
  background:var(--accent);color:#000;border:none;
  border-radius:6px;padding:7px 12px;font-size:0.75rem;font-weight:700;
  cursor:pointer;flex-shrink:0;transition:all .15s;font-family:var(--sans);
}
.btn-dl:hover{background:#00ffb3}

/* Progress bar */
.progress-box{
  margin:0 16px 8px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);display:none;
}
.progress-box.active{display:block}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-fname{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.progress-pct{font-family:var(--mono);font-size:0.78rem;color:var(--accent);font-weight:700}
.progress-bg{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .1s ease;width:0%}
.progress-speed{font-family:var(--mono);font-size:0.62rem;color:var(--text3);margin-top:5px}
.progress-mode{font-family:var(--mono);font-size:0.6rem;color:var(--accent2);margin-top:2px}

/* Bottom bar */
.bottom-bar{
  padding:10px 16px;border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;flex-direction:column;gap:8px;
}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;
  font-family:var(--sans);font-size:0.85rem;color:var(--text);
  outline:none;resize:none;transition:border-color .2s;
  max-height:120px;
  -webkit-appearance:none;
}
.chat-input:focus{border-color:var(--accent2)}
.chat-input::placeholder{color:var(--text3)}
.btn-send{
  background:var(--accent2);color:#fff;border:none;
  border-radius:var(--radius-sm);padding:10px 14px;
  font-size:1rem;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
  align-self:flex-end;
}
.btn-send:hover{background:#9d8fff}
.btn-send:active{transform:scale(.95)}

/* Drop zone */
.drop-zone{
  border:1.5px dashed var(--border);border-radius:var(--radius-sm);
  padding:10px 16px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(0,229,160,0.04)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-zone-icon{font-size:1.2rem}
.drop-zone-text{font-size:0.78rem;color:var(--text2)}
.drop-zone-hint{font-size:0.65rem;color:var(--text3);font-family:var(--mono)}

/* Connected banner */
.chat-header{
  padding:10px 16px;border-bottom:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;gap:10px;
}
.chat-header-name{font-weight:700;font-size:0.95rem}
.chat-header-code{font-family:var(--mono);font-size:0.68rem;color:var(--text2);letter-spacing:2px}
.btn-save-device{
  margin-left:auto;font-family:var(--mono);font-size:0.68rem;
  background:none;border:1px solid var(--border);color:var(--text3);
  padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s;
}
.btn-save-device:hover{color:var(--accent);border-color:var(--accent)}
.btn-disconnect{
  background:none;border:none;color:var(--text3);
  cursor:pointer;font-size:1rem;padding:4px;border-radius:4px;
  transition:color .15s;
}
.btn-disconnect:hover{color:var(--accent3)}

/* ── Modal ──────────────────────────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:100;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;width:100%;max-width:320px;
  animation:modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
.modal h3{font-size:.95rem;margin-bottom:6px}
.modal p{font-size:.78rem;color:var(--text2);margin-bottom:14px;line-height:1.5}
.modal-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:11px 13px;
  font-family:var(--sans);font-size:.88rem;color:var(--text);
  outline:none;margin-bottom:12px;-webkit-appearance:none;
}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.modal-btns .btn{
  flex:1;font-family:var(--sans);font-size:.85rem;font-weight:600;
  border:none;cursor:pointer;border-radius:var(--radius-sm);
  padding:11px 16px;transition:all .15s;
}
.btn-modal-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important}
.btn-modal-ok{background:var(--accent);color:#000}
.btn-modal-ok:hover{background:#00ffb3}

/* ── Toast ──────────────────────────────────────────── */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:100px;padding:9px 18px;
  font-size:.78rem;font-family:var(--mono);color:var(--text);
  z-index:1000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--accent);color:var(--accent)}
#toast.error{border-color:var(--accent3);color:var(--accent3)}

/* ── Mobile layout ──────────────────────────────────── */
@media(max-width:600px){
  #layout{
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr;
  }
  #sidebar{
    border-right:none;border-bottom:1px solid var(--border);
    max-height:200px;
  }
  #sidebar-inner{padding:8px}
  .tab-item{padding:7px 8px}
  #connect-panel{padding:6px}
  #main{grid-row:3}
}

/* Scrollbar global */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="layout">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo">Earl<span>inki</span></div>
    <div class="my-code-badge" onclick="copyMyCode()" title="Copiar mi código">
      Mi código: <span class="code-val" id="myCodeVal">——</span> 📋
    </div>
    <div class="status-pill" id="statusPill">
      <div class="dot"></div><span id="statusText">iniciando</span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-inner">
      <!-- Active connections -->
      <div class="sidebar-section-title">Activos</div>
      <div id="tabsList">
        <div class="sidebar-empty" id="noTabs">sin conexiones</div>
      </div>

      <div style="height:12px"></div>
      <div class="sidebar-section-title">Frecuentes</div>
      <div id="savedList">
        <div class="sidebar-empty" id="noSaved">sin guardados</div>
      </div>
    </div>

    <!-- Connect panel -->
    <div id="connect-panel">
      <div class="connect-panel-inner">
        <div class="connect-row">
          <input class="code-input" id="connectInput" type="text"
            inputmode="numeric" maxlength="6" placeholder="código 6 dígitos"
            autocomplete="off" spellcheck="false">
          <button class="btn-go" onclick="connectToPeer()" title="Conectar">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- Welcome -->
    <div id="welcome">
      <div class="big">⚡</div>
      <div style="font-size:1rem;font-weight:700;color:var(--text2)">Earlinki</div>
      <div class="hint">Ingresá un código de 6 dígitos o tocá un dispositivo frecuente para conectarte.</div>
    </div>

    <!-- Chat panels generated dynamically -->
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Guardar dispositivo</h3>
    <p>Dale un nombre para encontrarlo rápido la próxima vez.</p>
    <input class="modal-input" id="modalNameInput" type="text" placeholder="Mi celular / Netbook..." maxlength="30">
    <div class="modal-btns">
      <button class="btn btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-modal-ok" onclick="saveDeviceConfirm()">Guardar ★</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let peer = null;
let myCode = null;

// connections map: peerId → { conn, messages[], fileReceiving{}, progressEl, unread }
const sessions = {};

let activeTab = null; // current peerId shown
let pendingSaveCode = null; // for modal

const LS_KEY = 'earlinki_v2_devices';
const AVATARS = ['💻','📱','🖥️','⌨️','🖱️','📡','🔌','💾','📲','🖨️'];

// Chunking thresholds
const SMALL_CHUNK  = 64  * 1024;        // 64KB  — small files
const LARGE_CHUNK  = 256 * 1024;        // 256KB — large files
const SMALL_LIMIT  = 50  * 1024 * 1024; // 50MB threshold
const LARGE_LIMIT  = 100 * 1024 * 1024; // 100MB threshold (old cap — now removed)

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function startApp() {
  setStatus('connecting','iniciando...');
  renderSavedList();
  initPeer();
}

function waitForPeer() {
  if (typeof Peer !== 'undefined') startApp();
  else setTimeout(waitForPeer, 100);
}

function generateCode() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function initPeer() {
  const code = generateCode();
  peer = new Peer(code, {
    debug: 0,
    config: { iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'}
    ]}
  });

  peer.on('open', id => {
    myCode = id;
    document.getElementById('myCodeVal').textContent = id;
    setStatus('online','listo');
    showToast('Listo para conectar','success');
  });

  peer.on('connection', conn => handleIncoming(conn));

  peer.on('error', err => {
    if (err.type === 'peer-unavailable') {
      showToast('Código inválido o dispositivo offline','error');
      setStatus('online','listo');
    } else if (err.type === 'unavailable-id') {
      setTimeout(initPeer, 600);
    } else {
      console.warn('PeerJS error:', err.type, err.message);
    }
  });

  peer.on('disconnected', () => {
    setStatus('connecting','reconectando...');
    peer.reconnect();
  });
}

// ═══════════════════════════════════════════════════════════════
// CONNECTIONS
// ═══════════════════════════════════════════════════════════════
function connectToPeer() {
  const input = document.getElementById('connectInput');
  const code  = input.value.trim();
  if (code.length !== 6 || isNaN(code)) { showToast('Ingresá un código de 6 dígitos','error'); return; }
  if (code === myCode)                   { showToast('No podés conectarte a vos mismo!','error'); return; }
  if (sessions[code])                    { switchTab(code); input.value=''; return; }

  setStatus('connecting','conectando...');
  const conn = peer.connect(code, { reliable:true, serialization:'binary' });
  setupSession(conn);
  input.value = '';
}

function handleIncoming(conn) {
  if (sessions[conn.peer]) { conn.close(); return; } // already connected
  setupSession(conn);
}

function setupSession(conn) {
  const pid = conn.peer;

  // Create session
  sessions[pid] = {
    conn,
    messages: [],
    fileReceiving: {},
    unread: 0,
    progressEl: null,
    startTime: null
  };

  createChatPanel(pid);
  renderTabsList();

  conn.on('open', () => {
    setStatus('online','listo');
    switchTab(pid);
    showToast('¡Conectado a ' + pid + '!','success');
  });

  conn.on('data', data => handleData(pid, data));

  conn.on('close', () => closeSession(pid));
  conn.on('error', err => { console.warn(err); closeSession(pid); });
}

function closeSession(pid) {
  if (!sessions[pid]) return;
  delete sessions[pid];
  const panel = document.getElementById('panel-' + pid);
  if (panel) panel.remove();
  renderTabsList();
  if (activeTab === pid) {
    activeTab = null;
    const remaining = Object.keys(sessions);
    if (remaining.length) switchTab(remaining[remaining.length-1]);
    else document.getElementById('welcome').style.display = 'flex';
  }
  showToast('Conexión cerrada','');
  if (Object.keys(sessions).length === 0) setStatus('online','listo');
}

// ═══════════════════════════════════════════════════════════════
// PANEL UI
// ═══════════════════════════════════════════════════════════════
function createChatPanel(pid) {
  const saved = getSavedDevice(pid);
  const name  = saved ? saved.name : 'Dispositivo ' + pid;

  const panel = document.createElement('div');
  panel.className = 'chat-panel';
  panel.id = 'panel-' + pid;

  panel.innerHTML = `
    <div class="chat-header">
      <div style="font-size:1.3rem">${saved ? saved.avatar : '⚡'}</div>
      <div>
        <div class="chat-header-name" id="hname-${pid}">${escHtml(name)}</div>
        <div class="chat-header-code">${pid}</div>
      </div>
      <button class="btn-save-device" id="savebtn-${pid}" onclick="promptSave('${pid}')"
        style="${saved?'display:none':''}">Guardar ★</button>
      <button class="btn-disconnect" onclick="disconnectPeer('${pid}')" title="Desconectar">✕</button>
    </div>
    <div class="messages-area" id="msgs-${pid}">
      <div style="text-align:center;color:var(--text3);font-size:.72rem;font-family:var(--mono);padding:24px">
        conexión establecida · enviá algo ⚡
      </div>
    </div>
    <div class="progress-box" id="prog-${pid}">
      <div class="progress-top">
        <span class="progress-fname" id="prog-name-${pid}"></span>
        <span class="progress-pct" id="prog-pct-${pid}">0%</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" id="prog-bar-${pid}"></div></div>
      <div class="progress-speed" id="prog-speed-${pid}"></div>
      <div class="progress-mode" id="prog-mode-${pid}"></div>
    </div>
    <div class="bottom-bar">
      <div class="drop-zone" id="dz-${pid}"
        ondragover="dzDragOver(event,'${pid}')"
        ondragleave="dzDragLeave('${pid}')"
        ondrop="dzDrop(event,'${pid}')">
        <input type="file" onchange="fileSelected(event,'${pid}')">
        <span class="drop-zone-icon">📁</span>
        <div>
          <div class="drop-zone-text">Seleccioná o arrastrá un archivo</div>
          <div class="drop-zone-hint">sin límite de tamaño · chunking automático ≥50MB</div>
        </div>
      </div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatinput-${pid}" rows="1"
          placeholder="Texto o link..."
          onkeydown="chatKey(event,'${pid}')"></textarea>
        <button class="btn-send" onclick="sendText('${pid}')">↑</button>
      </div>
    </div>
  `;

  document.getElementById('main').appendChild(panel);
  sessions[pid].progressEl = panel.querySelector('.progress-box');
}

function switchTab(pid) {
  // Hide all panels
  document.querySelectorAll('.chat-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('welcome').style.display = 'none';

  const panel = document.getElementById('panel-' + pid);
  if (panel) panel.classList.add('active');

  activeTab = pid;
  if (sessions[pid]) sessions[pid].unread = 0;
  renderTabsList();
}

function disconnectPeer(pid) {
  if (sessions[pid]) sessions[pid].conn.close();
  closeSession(pid);
}

// ═══════════════════════════════════════════════════════════════
// MESSAGING
// ═══════════════════════════════════════════════════════════════
function chatKey(e, pid) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(pid); }
}

function sendText(pid) {
  const el   = document.getElementById('chatinput-' + pid);
  const text = el.value.trim();
  if (!text || !sessions[pid]) return;
  sessions[pid].conn.send({ type:'text', content:text });
  appendText(pid, text, true);
  el.value = '';
}

function handleData(pid, data) {
  if (!sessions[pid]) return;

  if (data.type === 'text') {
    appendText(pid, data.content, false);
    if (activeTab !== pid) { sessions[pid].unread++; renderTabsList(); }
    return;
  }

  if (data.type === 'file-start') {
    sessions[pid].fileReceiving[data.fileId] = {
      name: data.name, size: data.size, mimeType: data.mimeType,
      totalChunks: data.totalChunks, chunks: [],
      received: 0, startTime: Date.now()
    };
    showProgress(pid, data.name, 0, data.size > LARGE_LIMIT ? 'chunking pesado' : data.size > SMALL_LIMIT ? 'chunking estándar' : 'transferencia rápida');
    if (activeTab !== pid) { sessions[pid].unread++; renderTabsList(); }
    return;
  }

  if (data.type === 'file-chunk') {
    const f = sessions[pid].fileReceiving[data.fileId];
    if (!f) return;
    f.chunks[data.chunkIndex] = data.data;
    f.received++;
    const pct   = Math.round(f.received / f.totalChunks * 100);
    const elapsed = (Date.now() - f.startTime) / 1000 || .001;
    const speed   = (f.received * data.data.byteLength) / elapsed;
    updateProgress(pid, pct, formatBytes(speed) + '/s');
    return;
  }

  if (data.type === 'file-end') {
    const f = sessions[pid].fileReceiving[data.fileId];
    if (!f) return;
    const blob = new Blob(f.chunks, { type: f.mimeType || 'application/octet-stream' });
    appendFileReceived(pid, f.name, f.size, blob);
    hideProgress(pid);
    delete sessions[pid].fileReceiving[data.fileId];
    showToast('Archivo recibido: ' + f.name, 'success');
    return;
  }
}

function appendText(pid, text, sent) {
  const area = document.getElementById('msgs-' + pid);
  if (!area) return;
  clearEmpty(area);

  const isLink = /^https?:\/\//i.test(text) || /^www\./i.test(text);
  const div    = document.createElement('div');
  div.className = 'msg ' + (sent ? 'msg-sent' : 'msg-received');
  const time   = new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});

  if (isLink && !sent) {
    const url = text.startsWith('http') ? text : 'https://' + text;
    div.innerHTML = `<div style="word-break:break-all">${escHtml(text)}</div>
      <div class="msg-link-actions">
        <button class="btn-link-action btn-open" onclick="window.open('${escHtml(url)}','_blank')">🔗 Abrir</button>
        <button class="btn-link-action btn-copy-link" onclick="copyClip('${escHtml(url)}')">📋 Copiar</button>
      </div>
      <div class="msg-meta">${time}</div>`;
  } else {
    div.innerHTML = `<div>${escHtml(text)}</div><div class="msg-meta">${time}</div>`;
  }

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// FILE SENDING — dynamic chunking
// ═══════════════════════════════════════════════════════════════
function fileSelected(e, pid) { const f = e.target.files[0]; if(f) sendFile(pid,f); e.target.value=''; }
function dzDragOver(e,pid)   { e.preventDefault(); document.getElementById('dz-'+pid).classList.add('drag-over'); }
function dzDragLeave(pid)    { document.getElementById('dz-'+pid).classList.remove('drag-over'); }
function dzDrop(e,pid)       { e.preventDefault(); dzDragLeave(pid); const f=e.dataTransfer.files[0]; if(f) sendFile(pid,f); }

async function sendFile(pid, file) {
  const sess = sessions[pid];
  if (!sess) { showToast('No hay conexión activa','error'); return; }

  // Determine chunk size dynamically
  let chunkSize, modeLabel;
  if (file.size <= SMALL_LIMIT) {
    chunkSize = SMALL_CHUNK;   // 64KB — fast, small overhead
    modeLabel = 'transferencia rápida';
  } else {
    chunkSize = LARGE_CHUNK;   // 256KB — fewer messages, less GC pressure
    modeLabel = file.size > 500*1024*1024 ? 'chunking pesado' : 'chunking estándar';
  }

  const fileId     = Date.now().toString(36) + Math.random().toString(36).slice(2);
  const totalChunks = Math.ceil(file.size / chunkSize);

  sess.conn.send({ type:'file-start', fileId, name:file.name, size:file.size, mimeType:file.type, totalChunks });
  showProgress(pid, file.name, 0, modeLabel);

  const sendStart = Date.now();
  let chunkIdx    = 0;

  // Use a promise-based loop to avoid call stack overflow on large files
  async function sendLoop() {
    while (chunkIdx < totalChunks) {
      const start  = chunkIdx * chunkSize;
      const end    = Math.min(start + chunkSize, file.size);
      const slice  = file.slice(start, end);
      const buffer = await slice.arrayBuffer();

      sess.conn.send({ type:'file-chunk', fileId, chunkIndex:chunkIdx, data:buffer });

      chunkIdx++;
      const pct     = Math.round(chunkIdx / totalChunks * 100);
      const elapsed = (Date.now() - sendStart) / 1000 || .001;
      const speed   = (chunkIdx * chunkSize) / elapsed;
      updateProgress(pid, pct, formatBytes(speed) + '/s');

      // Throttle: yield to event loop every N chunks to avoid saturating the data channel
      const yieldEvery = file.size > SMALL_LIMIT ? 4 : 16;
      if (chunkIdx % yieldEvery === 0) await sleep(0);
    }

    sess.conn.send({ type:'file-end', fileId });
    appendFileSent(pid, file.name, file.size);
    hideProgress(pid);
  }

  sendLoop().catch(err => {
    console.error('sendFile error:', err);
    showToast('Error al enviar el archivo','error');
    hideProgress(pid);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function appendFileSent(pid, name, size) {
  const area = document.getElementById('msgs-' + pid);
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'msg-file sent';
  div.innerHTML = `<div class="file-icon">${fileIcon(name)}</div>
    <div class="file-info">
      <div class="file-name">${escHtml(name)}</div>
      <div class="file-size">${formatBytes(size)} · enviado ✓</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendFileReceived(pid, name, size, blob) {
  const area = document.getElementById('msgs-' + pid);
  if (!area) return;
  const url = URL.createObjectURL(blob);
  const div = document.createElement('div');
  div.className = 'msg-file';
  div.innerHTML = `<div class="file-icon">${fileIcon(name)}</div>
    <div class="file-info">
      <div class="file-name">${escHtml(name)}</div>
      <div class="file-size">${formatBytes(size)}</div>
    </div>
    <a href="${url}" download="${escHtml(name)}" style="text-decoration:none">
      <button class="btn-dl">↓</button>
    </a>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════
function showProgress(pid, name, pct, mode) {
  const el = document.getElementById('prog-'+pid);
  if (!el) return;
  el.classList.add('active');
  document.getElementById('prog-name-'+pid).textContent = name;
  document.getElementById('prog-pct-'+pid).textContent  = pct + '%';
  document.getElementById('prog-bar-'+pid).style.width  = pct + '%';
  document.getElementById('prog-speed-'+pid).textContent = '';
  document.getElementById('prog-mode-'+pid).textContent  = mode || '';
}

function updateProgress(pid, pct, speed) {
  document.getElementById('prog-pct-'+pid).textContent   = pct + '%';
  document.getElementById('prog-bar-'+pid).style.width   = pct + '%';
  document.getElementById('prog-speed-'+pid).textContent = speed;
}

function hideProgress(pid) {
  setTimeout(() => {
    const el = document.getElementById('prog-'+pid);
    if (el) el.classList.remove('active');
  }, 2000);
}

// ═══════════════════════════════════════════════════════════════
// TABS SIDEBAR
// ═══════════════════════════════════════════════════════════════
function renderTabsList() {
  const container = document.getElementById('tabsList');
  const noTabs    = document.getElementById('noTabs');
  const pids      = Object.keys(sessions);

  if (pids.length === 0) {
    noTabs.style.display = 'block';
    container.innerHTML  = '';
    container.appendChild(noTabs);
    return;
  }

  noTabs.style.display = 'none';
  container.innerHTML  = '';

  pids.forEach(pid => {
    const sess  = sessions[pid];
    const saved = getSavedDevice(pid);
    const name  = saved ? saved.name : 'Dispositivo ' + pid;
    const av    = saved ? saved.avatar : '⚡';

    const item = document.createElement('div');
    item.className = 'tab-item' + (pid === activeTab ? ' active' : '');
    item.innerHTML = `
      <div class="tab-avatar">
        ${av}
        <div class="tab-online-dot"></div>
      </div>
      <div class="tab-info">
        <div class="tab-name">${escHtml(name)}</div>
        <div class="tab-code">${pid}</div>
      </div>
      ${sess.unread > 0 ? `<div class="tab-unread">${sess.unread}</div>` : ''}
      <button class="tab-close" onclick="disconnectPeer('${pid}')" title="Cerrar">✕</button>
    `;
    item.addEventListener('click', e => {
      if (e.target.closest('.tab-close')) return;
      switchTab(pid);
    });
    container.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
// SAVED DEVICES
// ═══════════════════════════════════════════════════════════════
function getDevices()      { try { return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); } catch { return []; } }
function saveDevices(list) { localStorage.setItem(LS_KEY, JSON.stringify(list)); }
function getSavedDevice(code) { return getDevices().find(d => d.code === code); }

function renderSavedList() {
  const list    = getDevices();
  const container = document.getElementById('savedList');
  const noSaved   = document.getElementById('noSaved');

  if (list.length === 0) {
    noSaved.style.display = 'block';
    container.innerHTML   = '';
    container.appendChild(noSaved);
    return;
  }

  noSaved.style.display = 'none';
  container.innerHTML   = '';

  list.forEach((dev, i) => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.innerHTML = `
      <div class="saved-avatar">${dev.avatar}</div>
      <div class="saved-info">
        <div class="saved-name">${escHtml(dev.name)}</div>
        <div class="saved-code">${dev.code}</div>
      </div>
      <button class="saved-del" onclick="removeSaved(event,${i})" title="Eliminar">✕</button>
    `;
    item.addEventListener('click', e => {
      if (e.target.closest('.saved-del')) return;
      document.getElementById('connectInput').value = dev.code;
      connectToPeer();
    });
    container.appendChild(item);
  });
}

function promptSave(pid) {
  pendingSaveCode = pid;
  document.getElementById('modalNameInput').value = '';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('modalNameInput').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  pendingSaveCode = null;
}

function saveDeviceConfirm() {
  const name = document.getElementById('modalNameInput').value.trim();
  if (!name) { showToast('Ingresá un nombre','error'); return; }

  const devices = getDevices();
  const idx     = devices.findIndex(d => d.code === pendingSaveCode);
  const device  = { code: pendingSaveCode, name, avatar: AVATARS[Math.floor(Math.random()*AVATARS.length)], addedAt: Date.now() };

  if (idx >= 0) devices[idx] = device;
  else devices.unshift(device);

  saveDevices(devices);
  renderSavedList();
  closeModal();

  // Update panel header
  const hn = document.getElementById('hname-' + pendingSaveCode);
  if (hn) hn.textContent = name;
  const sb = document.getElementById('savebtn-' + pendingSaveCode);
  if (sb) sb.style.display = 'none';

  renderTabsList();
  showToast(`"${name}" guardado ★`,'success');
}

function removeSaved(e, i) {
  e.stopPropagation();
  const devices = getDevices();
  devices.splice(i, 1);
  saveDevices(devices);
  renderSavedList();
  showToast('Dispositivo eliminado','');
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const span = document.getElementById('statusText');
  pill.className  = 'status-pill ' + type;
  span.textContent = text;
}

let toastT = null;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => { t.className = ''; }, 2800);
}

function copyMyCode() {
  copyClip(myCode);
  showToast('Código copiado!','success');
}

function copyClip(text) {
  if (navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>fbCopy(text));
  else fbCopy(text);
  showToast('Copiado!','success');
}

function fbCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function clearEmpty(area) {
  const e = area.querySelector('div[style*="conexión establecida"]');
  if (e) e.remove();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function fileIcon(name) {
  const e = name.split('.').pop().toLowerCase();
  return ({
    pdf:'📄',doc:'📝',docx:'📝',ppt:'📊',pptx:'📊',xls:'📈',xlsx:'📈',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',
    mp4:'🎥',mov:'🎥',avi:'🎥',mkv:'🎥',mp3:'🎵',wav:'🎵',ogg:'🎵',
    zip:'🗜️',rar:'🗜️','7z':'🗜️',txt:'📃',md:'📃'
  })[e] || '📎';
}

// ─── Events ──────────────────────────────────────────────────
document.getElementById('connectInput').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});
document.getElementById('connectInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') connectToPeer();
});
document.getElementById('modalNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveDeviceConfirm();
});
</script>

</script>
