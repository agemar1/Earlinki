<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Earlinki — P2P</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --surface3: #22222f;
    --border: #2a2a3a; --accent: #00e5a0; --accent2: #7c6bff; --danger: #ff6b6b;
    --text: #f0f0f8; --text2: #8888aa; --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }
  @supports (height: 100dvh) { html, body { height: 100dvh; } }
  
  /* Layout */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 1000px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  
  /* Topbar */
  header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .logo { font-size: 1.2rem; font-weight: 700; }
  .logo span { color: var(--accent); }
  .my-id-box { background: var(--surface2); padding: 4px 12px; border-radius: 20px; font-family: var(--mono); font-size: 0.8rem; border: 1px solid var(--border); display: flex; gap: 8px; align-items: center; cursor: pointer; }
  .my-id-box span { color: var(--accent); font-weight: bold; letter-spacing: 2px; }
  
  /* Main Container */
  main { display: flex; flex: 1; min-height: 0; }
  
  /* Sidebar */
  #sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .connect-box { padding: 12px; border-bottom: 1px solid var(--border); }
  .connect-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; text-align: center; font-family: var(--mono); letter-spacing: 2px; margin-bottom: 8px; outline: none; }
  .connect-box input:focus { border-color: var(--accent); }
  .connect-box button { width: 100%; background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; }
  
  .tabs-list { flex: 1; overflow-y: auto; padding: 8px; }
  .tab { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--surface2); border-radius: 6px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
  .tab.active { border-color: var(--accent); background: var(--surface3); }
  .tab-name { font-size: 0.85rem; font-weight: 600; font-family: var(--mono); }
  .tab-close { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; }
  .tab-close:hover { color: var(--danger); }
  .unread-badge { background: var(--accent2); color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; display: none; }
  .tab.has-unread .unread-badge { display: inline-block; }

  /* Chat Area */
  #chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
  #welcome-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
  #welcome-screen h2 { color: var(--text2); font-weight: 400; font-size: 1rem; }
  
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  
  /* Message Bubbles */
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
  .msg.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.them { background: var(--surface2); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
  .msg-time { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; text-align: right; font-family: var(--mono); }
  
  /* File Transfer UI */
  .file-box { display: flex; align-items: center; gap: 12px; }
  .file-icon { font-size: 1.5rem; }
  .file-info { display: flex; flex-direction: column; }
  .file-name { font-weight: 600; font-size: 0.85rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 0.7rem; opacity: 0.8; font-family: var(--mono); }
  .dl-btn { background: rgba(0,0,0,0.2); border: none; color: inherit; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 6px; }
  
  /* Progress Bar */
  .progress-container { width: 100%; height: 6px; background: rgba(0,0,0,0.2); border-radius: 3px; margin-top: 8px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: #000; width: 0%; transition: width 0.1s; }
  .msg.them .progress-fill { background: var(--accent); }

  /* Input Area */
  .input-area { padding: 12px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .attach-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; outline: none; font-family: var(--sans); }
  .chat-input:focus { border-color: var(--accent2); }
  .send-btn { background: var(--accent2); color: #fff; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    main { flex-direction: column; }
    #sidebar { width: 100%; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .connect-box { display: flex; gap: 8px; padding: 8px; }
    .connect-box input { margin-bottom: 0; }
    .connect-box button { width: auto; padding: 0 20px; }
    .tabs-list { display: flex; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 8px; }
    .tab { margin-bottom: 0; flex-shrink: 0; }
  }

  /* Toasts */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--accent); color: var(--text); padding: 8px 16px; border-radius: 20px; font-family: var(--mono); font-size: 0.8rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Earl<span>inki</span></div>
    <div class="my-id-box" onclick="copyMyId()">Mi ID: <span id="my-id-display">---</span></div>
  </header>

  <main>
    <aside id="sidebar">
      <div class="connect-box">
        <input type="text" id="peer-id-input" placeholder="ID de destino (6 núm)" maxlength="6" inputmode="numeric">
        <button onclick="connectToPeer()">Unir</button>
      </div>
      <div class="tabs-list" id="tabs-container">
        </div>
    </aside>

    <section id="chat-container">
      <div id="welcome-screen">
        <h2>No hay chats activos.</h2>
        <p style="font-size:0.8rem; color:var(--text2); margin-top:8px;">Conectate a un ID para empezar.</p>
      </div>
      
      <div class="messages" id="messages-container">
        </div>

      <div class="input-area" id="input-area" style="display: none;">
        <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()">📁</button>
        <input type="text" class="chat-input" id="msg-input" placeholder="Escribí un mensaje..." onkeypress="if(event.key==='Enter') sendTextMessage()">
        <button class="send-btn" onclick="sendTextMessage()">➔</button>
      </div>
    </section>
  </main>
</div>

<div id="toast">Notificación</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  // ==========================================
  // ESTADO GLOBAL (Lógica reconstruida)
  // ==========================================
  let peer = null;
  let myId = Math.floor(100000 + Math.random() * 900000).toString();
  
  // connections almacena: { peerId: { conn, messages: [], unread: 0 } }
  const connections = {};
  let activePeerId = null;

  // fileTransfers almacena estado de envío/recepción para el sistema "Ping-Pong"
  const fileTransfers = {}; 
  const CHUNK_SIZE = 256 * 1024; // 256KB por pedazo (Estable para WebRTC)

  // ==========================================
  // INICIALIZACIÓN PEERJS
  // ==========================================
  function init() {
    document.getElementById('my-id-display').innerText = myId;
    
    peer = new Peer(myId, {
      config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => showToast('Sistema en línea ✅'));
    
    // Recibiendo una conexión entrante
    peer.on('connection', conn => {
      setupConnection(conn);
    });

    peer.on('error', err => {
      showToast('Error de conexión ❌');
      console.error(err);
    });
  }

  // ==========================================
  // GESTIÓN DE CONEXIONES
  // ==========================================
  function connectToPeer() {
    const targetId = document.getElementById('peer-id-input').value.trim();
    if (targetId.length !== 6 || isNaN(targetId)) return showToast('El ID debe tener 6 números');
    if (targetId === myId) return showToast('No podés conectarte a vos mismo');
    
    document.getElementById('peer-id-input').value = '';
    
    // Si ya existe, solo lo enfocamos
    if (connections[targetId] && connections[targetId].conn.open) {
      return openChat(targetId);
    }

    showToast('Conectando...');
    const conn = peer.connect(targetId, { reliable: true });
    setupConnection(conn);
  }

  function setupConnection(conn) {
    const pid = conn.peer;

    // Prevenir conexiones duplicadas "fantasma"
    if (connections[pid]) {
      if (connections[pid].conn.open) return; // Ya está bien
    }

    conn.on('open', () => {
      showToast(`Conectado a ${pid}`);
      connections[pid] = { conn: conn, messages: [], unread: 0 };
      renderTabs();
      openChat(pid); // Abrir automáticamente al conectar
    });

    conn.on('data', data => handleDataReceipt(pid, data));
    
    conn.on('close', () => removeConnection(pid));
    conn.on('error', () => removeConnection(pid));
  }

  function removeConnection(pid) {
    if (connections[pid]) delete connections[pid];
    if (activePeerId === pid) {
      activePeerId = null;
      document.getElementById('welcome-screen').style.display = 'flex';
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('messages-container').innerHTML = '';
    }
    renderTabs();
    showToast(`Conexión con ${pid} cerrada`);
  }

  // ==========================================
  // INTERFAZ DE USUARIO (PESTAÑAS Y CHAT)
  // ==========================================
  function renderTabs() {
    const container = document.getElementById('tabs-container');
    container.innerHTML = '';
    
    for (const pid in connections) {
      const data = connections[pid];
      const div = document.createElement('div');
      div.className = `tab ${activePeerId === pid ? 'active' : ''} ${data.unread > 0 ? 'has-unread' : ''}`;
      
      div.innerHTML = `
        <span class="tab-name" onclick="openChat('${pid}')">ID: ${pid}</span>
        <span class="unread-badge">${data.unread}</span>
        <button class="tab-close" onclick="removeConnection('${pid}')">✕</button>
      `;
      container.appendChild(div);
    }
  }

  function openChat(pid) {
    activePeerId = pid;
    connections[pid].unread = 0;
    
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('input-area').style.display = 'flex';
    
    renderTabs();
    renderMessages();
    setTimeout(() => document.getElementById('msg-input').focus(), 100);
  }

  function renderMessages() {
    if (!activePeerId || !connections[activePeerId]) return;
    const container = document.getElementById('messages-container');
    container.innerHTML = '';
    
    const msgs = connections[activePeerId].messages;
    msgs.forEach(msg => {
      const div = document.createElement('div');
      div.className = `msg ${msg.sender === 'me' ? 'me' : 'them'}`;
      
      if (msg.type === 'text') {
        // Detectar links
        const textEscaped = msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const withLinks = textEscaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:inherit; text-decoration:underline;">$1</a>');
        div.innerHTML = `<div>${withLinks}</div><div class="msg-time">${msg.time}</div>`;
      } 
      else if (msg.type === 'file') {
        const isComplete = msg.progress === 100;
        div.innerHTML = `
          <div class="file-box">
            <div class="file-icon">📄</div>
            <div class="file-info">
              <span class="file-name">${msg.fileName}</span>
              <span class="file-size">${(msg.fileSize / 1024 / 1024).toFixed(2)} MB</span>
            </div>
          </div>
          <div class="progress-container" style="display: ${isComplete ? 'none' : 'block'}" id="prog-bar-${msg.fileId}">
            <div class="progress-fill" style="width: ${msg.progress}%"></div>
          </div>
          ${isComplete && msg.blobUrl ? `<a href="${msg.blobUrl}" download="${msg.fileName}"><button class="dl-btn">Descargar</button></a>` : ''}
          <div class="msg-time" id="prog-text-${msg.fileId}">${isComplete ? msg.time : Math.floor(msg.progress)+'%'}</div>
        `;
      }
      container.appendChild(div);
    });
    
    container.scrollTop = container.scrollHeight;
  }

  function saveMessage(pid, msgObj) {
    if (!connections[pid]) return;
    msgObj.time = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    connections[pid].messages.push(msgObj);
    
    if (activePeerId === pid) {
      renderMessages();
    } else {
      connections[pid].unread++;
      renderTabs();
    }
  }

  // ==========================================
  // MENSAJERÍA DE TEXTO
  // ==========================================
  function sendTextMessage() {
    if (!activePeerId) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    // Mostrar en mi pantalla
    saveMessage(activePeerId, { sender: 'me', type: 'text', text: text });
    
    // Enviar por red
    connections[activePeerId].conn.send({ type: 'text', text: text });
    
    input.value = '';
  }

  // ==========================================
  // TRANSFERENCIA DE ARCHIVOS (SISTEMA PING-PONG)
  // ==========================================
  function handleFileSelect(e) {
    if (!activePeerId) return;
    const file = e.target.files[0];
    if (!file) return;
    
    const fileId = Math.random().toString(36).substr(2, 9);
    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
    
    // Guardar estado del archivo a enviar
    fileTransfers[fileId] = {
      role: 'sender',
      file: file,
      totalChunks: totalChunks,
      currentChunk: 0
    };

    // Crear mensaje en UI
    saveMessage(activePeerId, { sender: 'me', type: 'file', fileId: fileId, fileName: file.name, fileSize: file.size, progress: 0 });

    // Iniciar protocolo avisando al receptor
    connections[activePeerId].conn.send({ 
      type: 'file-start', fileId: fileId, fileName: file.name, fileSize: file.size, totalChunks: totalChunks, mime: file.type 
    });
    
    e.target.value = ''; // Reset input
  }

  // Envía el pedazo específico del archivo
  async function sendFileChunk(pid, fileId) {
    const transfer = fileTransfers[fileId];
    if (!transfer) return;

    const start = transfer.currentChunk * CHUNK_SIZE;
    const end = Math.min(start + CHUNK_SIZE, transfer.file.size);
    const chunkBlob = transfer.file.slice(start, end);
    const arrayBuffer = await chunkBlob.arrayBuffer();

    connections[pid].conn.send({
      type: 'file-chunk',
      fileId: fileId,
      chunkIndex: transfer.currentChunk,
      data: arrayBuffer
    });

    // Actualizar UI Local
    updateFileProgress(pid, fileId, transfer.currentChunk, transfer.totalChunks);
  }

  // ==========================================
  // MANEJO DE DATOS ENTRANTES (EL CEREBRO)
  // ==========================================
  function handleDataReceipt(pid, data) {
    if (!data || !data.type) return;

    // 1. Mensaje de Texto
    if (data.type === 'text') {
      saveMessage(pid, { sender: 'them', type: 'text', text: data.text });
    }
    
    // 2. Alguien quiere mandarme un archivo
    else if (data.type === 'file-start') {
      fileTransfers[data.fileId] = {
        role: 'receiver', chunks: [], totalChunks: data.totalChunks,
        fileName: data.fileName, fileSize: data.fileSize, mime: data.mime
      };
      
      saveMessage(pid, { sender: 'them', type: 'file', fileId: data.fileId, fileName: data.fileName, fileSize: data.fileSize, progress: 0 });
      
      // Le respondo: "Estoy listo, mandá el pedazo 0"
      connections[pid].conn.send({ type: 'file-ack', fileId: data.fileId, nextChunk: 0 });
    }
    
    // 3. Recibo confirmación de que llegó mi pedazo (Acuse de recibo)
    else if (data.type === 'file-ack') {
      const transfer = fileTransfers[data.fileId];
      if (transfer && transfer.role === 'sender') {
        transfer.currentChunk = data.nextChunk;
        if (transfer.currentChunk < transfer.totalChunks) {
          sendFileChunk(pid, data.fileId); // Envío el siguiente
        } else {
          // Terminé de enviar todo
          updateFileProgress(pid, data.fileId, transfer.totalChunks, transfer.totalChunks);
          delete fileTransfers[data.fileId];
        }
      }
    }
    
    // 4. Recibo un pedazo de archivo
    else if (data.type === 'file-chunk') {
      const transfer = fileTransfers[data.fileId];
      if (transfer && transfer.role === 'receiver') {
        transfer.chunks[data.chunkIndex] = data.data; // Guardo en memoria
        
        updateFileProgress(pid, data.fileId, data.chunkIndex + 1, transfer.totalChunks);

        if (data.chunkIndex + 1 < transfer.totalChunks) {
          // Pido el siguiente pedazo
          connections[pid].conn.send({ type: 'file-ack', fileId: data.fileId, nextChunk: data.chunkIndex + 1 });
        } else {
          // Llegó el último pedazo, armo el archivo
          const blob = new Blob(transfer.chunks, { type: transfer.mime });
          const url = URL.createObjectURL(blob);
          
          // Actualizo el mensaje en el historial con el link de descarga
          const msg = connections[pid].messages.find(m => m.fileId === data.fileId);
          if (msg) {
            msg.progress = 100;
            msg.blobUrl = url;
            if (activePeerId === pid) renderMessages();
          }
          
          showToast(`Archivo recibido: ${transfer.fileName}`);
          delete fileTransfers[data.fileId]; // Libero memoria de tracking
        }
      }
    }
  }

  // ==========================================
  // UTILIDADES
  // ==========================================
  function updateFileProgress(pid, fileId, current, total) {
    const msg = connections[pid].messages.find(m => m.fileId === fileId);
    if (!msg) return;
    
    msg.progress = Math.floor((current / total) * 100);
    
    // Si estoy viendo el chat, actualizo el DOM directo sin recargar todo
    if (activePeerId === pid) {
      const bar = document.getElementById(`prog-bar-${fileId}`);
      const text = document.getElementById(`prog-text-${fileId}`);
      if (bar) bar.querySelector('.progress-fill').style.width = `${msg.progress}%`;
      if (text) text.innerText = `${msg.progress}%`;
      
      if (msg.progress === 100) renderMessages(); // Recargar para mostrar botón de descarga
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function copyMyId() {
    navigator.clipboard.writeText(myId).catch(() => {
      const ta = document.createElement('textarea'); ta.value = myId; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    showToast('ID copiado al portapapeles');
  }

  // Iniciar
  window.onload = init;
</script>
</body>
</html>
